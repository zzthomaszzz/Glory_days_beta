name: Deploy to itch.io

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Download release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" `
            --repo ${{ github.repository }} `
            --pattern "*.zip" `
            --dir .

      - name: Download butler
        shell: pwsh
        run: |
          curl.exe -L -o butler.zip "https://broth.itch.ovh/butler/windows-amd64/LATEST/archive/default"
          Expand-Archive -Path butler.zip -DestinationPath butler -Force

      - name: Push to itch.io
        shell: pwsh
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          $zip = Get-ChildItem -Filter "*.zip" | Select-Object -First 1
          $version = "${{ github.ref_name }}".TrimStart('v')
          .\butler\butler.exe push $zip.Name thomasng/glory-days:windows --userversion $version
