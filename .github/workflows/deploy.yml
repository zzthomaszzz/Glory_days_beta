name: Deploy to itch.io

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0)'
        required: true

jobs:
  deploy-itch:
    runs-on: windows-latest

    steps:
      - name: Download release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ github.event.inputs.tag }}" } else { "${{ github.ref_name }}" }
          gh release download $tag `
            --repo ${{ github.repository }} `
            --pattern "*.zip" `
            --dir .

      - name: Download butler
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path _butler_dl | Out-Null
          curl.exe -L -o _butler_dl\butler.zip "https://broth.itch.zone/butler/windows-amd64/LATEST/archive/default"
          Expand-Archive -Path _butler_dl\butler.zip -DestinationPath butler -Force

      - name: Push to itch.io
        shell: pwsh
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          $zip = Get-ChildItem -Filter "GloryDay_*.zip" | Select-Object -First 1
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ github.event.inputs.tag }}" } else { "${{ github.ref_name }}" }
          $version = $tag.TrimStart('v')
          .\butler\butler.exe push $zip.Name thomasng/glory-days:windows --userversion $version

  deploy-server:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy server to DigitalOcean
        env:
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_HOST: ${{ secrets.DO_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$DO_SSH_KEY" > ~/.ssh/do_key
          chmod 600 ~/.ssh/do_key
          ssh -i ~/.ssh/do_key -o StrictHostKeyChecking=no root@$DO_HOST \
            "cd ~/gloryday && git pull && systemctl restart gloryday"
